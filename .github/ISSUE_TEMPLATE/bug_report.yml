name: Bug report
description: Report something in odf-kit that isn't working as documented
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. A small amount of
        detail up front saves a lot of back-and-forth later.

        **Before filing:** please check existing
        [open issues](https://github.com/GitHubNewbie0/odf-kit/issues) to see
        if your issue has already been reported. For security vulnerabilities,
        please use the [private reporting process](https://github.com/GitHubNewbie0/odf-kit/security)
        instead of filing a public issue.

  - type: input
    id: version
    attributes:
      label: odf-kit version
      description: Output of `npm list odf-kit` or the `VERSION` export
      placeholder: "0.13.6"
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      description: Where is the bug occurring?
      options:
        - Node.js
        - Browser
        - Both
        - Other (please describe in steps to reproduce)
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version (if applicable)
      description: Output of `node --version`
      placeholder: "v22.11.0"

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of odf-kit is affected?
      options:
        - Build (OdtDocument, OdsDocument)
        - Fill (template engine)
        - Read (readOdt, readOds, odtToHtml, odsToHtml)
        - Convert — from HTML / Markdown / TipTap / Lexical
        - Convert — from DOCX / XLSX
        - Convert — to Markdown / Typst
        - Unified tool page (githubnewbie0.github.io/odf-kit/tools/)
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of what you observed.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        The smallest possible code snippet (and input file, if relevant) that
        triggers the bug. Inline code in a fenced block; attach files by
        dragging them into this textarea.
      render: javascript
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Anything else?
      description: Stack traces, screenshots, related issues, or other context.